<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./src/images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./src/css/reset.css" />
    <link rel="stylesheet" href="./src/css/variables.css" />
    <link rel="stylesheet" href="./src/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Challenge - Stats Preview Card Component Main</title>
  </head>
  <body>
    <main class="container">
  <section class="card1">
    <h1 class="titulo">
      Get <span class="purple">insights</span> that help your business grow.
    </h1>

    <p class="text-description">
      Discover the benefits of data analytics and make better decisions
      regarding revenue, customer experience, and overall efficiency.
    </p>

    <ul class="social-network">
      <li class="info">
        <p class="number">10k+</p>
        <span class="text-info">companies</span>
      </li>

      <li class="info">
        <p class="number">314</p>
        <span class="text-info">templates</span>
      </li>

      <li class="info">
        <p class="number">12M+</p>
        <span class="text-info">queries</span>
      </li>
    </ul>
  </section>

  <section class="card2">
    <picture>
      <source
        media="(max-width: 376px)"
        srcset="./src/images/image-header-mobile.jpg"
      />
      <img
        src="./src/images/image-header-desktop.jpg"
        alt="image desktop"
      />
    </picture>
  </section>
</main>
  </body>
</html>
